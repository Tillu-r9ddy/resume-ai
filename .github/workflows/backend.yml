# Backend CI — runs on every push to main and on PRs.
#
# WHY a separate workflow from the frontend's ci.yml?
#   Different toolchain, different cache, different failure surface.
#   Splitting keeps the GitHub Checks UI readable ("Backend: pytest failed"
#   vs "Frontend: lint failed") and lets the two pipelines run in parallel
#   without one blocking the other on a slow install.
#
# WHY paths-filter the trigger?
#   A doc-only PR shouldn't burn CI minutes booting Python and pip-installing
#   FastAPI. We filter on backend/** and this workflow file itself, so the
#   pipeline only runs when there's plausibly something to validate.

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Stay in sync with backend/.python-version.
          python-version: '3.13'
          # Cache pip's wheel cache keyed on pyproject.toml so re-runs that
          # don't touch deps avoid the slow PyPI download phase.
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest
