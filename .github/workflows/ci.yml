# Frontend CI — runs on every push to main and on PRs.
#
# WHY a separate workflow from backend.yml?
#   Different toolchain, different cache (npm vs pip), different blast
#   radius. Splitting keeps GitHub Checks readable ("Frontend: tests"
#   vs "Backend: pytest") and lets the two jobs run in parallel.
#
# WHY pin Node 22 (not 20, not "lts")?
#   The frontend package.json declares `"engines": { "node": ">=20" }`
#   but a few transitive deps installed via `vitest@4` warn on Node 20.
#   Node 22 is the active LTS through 2027. We pin a major version
#   number — using "lts" silently upgrades us on every Node release.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -w frontend

      - name: Build
        run: npm run build
