# ──────────────────────────────────────────────────────────────────────────────
# nginx config for the prod SPA container.
#
# Two routing rules:
#   1. /api/*       → proxy_pass to the backend service.
#   2. everything   → try the file, then fall back to index.html.
#                     This is the SPA-router escape hatch — without it,
#                     refreshing /editor would 404 because there's no
#                     /editor file on disk.
#
# Why a tiny `gzip_types` list (not gzip_static)?
#   Vite already builds with content hashes in filenames. We don't pre-gzip;
#   nginx does it on the fly for text MIME types only. Bin assets (woff2,
#   already-compressed images) are skipped to avoid wasted CPU.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets, no cache for the HTML shell. The HTML is
    # the only file that knows the current asset hashes; if it's cached
    # stale, the user pulls last week's JS bundles.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api/* to the backend service in docker-compose. The hostname
    # `backend` resolves via the compose-managed user network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE: turn buffering off and bump the read timeout so long
        # generations don't get cut at the proxy.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # SPA fallback — for any unmatched request, serve index.html so React
    # Router can resolve the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
